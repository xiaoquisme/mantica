version: 2

project_name: mantica

builds:
  - id: mantica
    main: ./cmd/mantica
    dir: server
    binary: mantica
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - name: mantica
    repository:
      owner: xiaoquisme
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/xiaoquisme/mantica"
    description: "Mantica CLI — local agent runtime and management tool for the Multica platform"
    license: "Apache-2.0"
    install: |
      bin.install "mantica"
    test: |
      system "#{bin}/mantica", "version"
